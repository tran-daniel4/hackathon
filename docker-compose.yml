services:
  api:
    build: app/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis

  # worker:
  #   build: ./worker
  #   env_file:
  #     - .env
  #   depends_on:
  #     - redis
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
