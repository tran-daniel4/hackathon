name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pyright

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (pyright)
        run: pyright .

  web:
    name: Web — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

  docker:
    name: Docker — build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build app/api -t agentic-system-diagrammer-api:ci
